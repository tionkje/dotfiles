live_config_reload = true


import = [ 
  "./tomorrow_night_bright.toml" 
  # "./github_light_high_contrast.toml"
]



# [colors]
# draw_bold_text_with_bright_colors = true

[font]
size = 12.0
#builtin_box_drawing = false
glyph_offset.x = 0

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.bold_italic]
family = "MesloLGS Nerd Font"
style = "Bold Italic"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"
#
[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[mouse]
hide_when_typing = true

[scrolling]
history = 100000

[selection]
save_to_clipboard = true

[window]
decorations = "none"
dynamic_title = true
startup_mode = "Maximized"

[window.padding]
x = 0
y = 0
