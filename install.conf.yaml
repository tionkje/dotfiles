- clean: ['~', '~/.config']

- create:
  - ~/.config
  - ~/.vim/undo
  - ~/.vim/swap
  - ~/.vim/backup

- link:
    ~/.dotfiles: ""
    ~/.tmux.conf:
      #~/.zshrc:
    ~/.zsh_plugins.txt: 
    ~/.config/nvim: nvim
    ~/.config/alacritty: alacritty

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - 'sudo pacman -Syu --noconfirm neovim tmux fzf ripgrep the_silver_searcher code alacritty'

  # - 
  #   command: 'sudo nix-channel --update'
