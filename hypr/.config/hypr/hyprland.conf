# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

env = PATH,$HOME/.local/bin:$PATH

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
#$terminal = alacritty -e zsh -c "tmux a || tmux"
$terminal = alacritty
$fileManager = nautilus
#$menu = rofi -show run
$menu = ~/.config/rofi/launchers/type-2/launcher.sh
# $menu = hyprlauncher

$slack_team = T021KJ15Q84

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#exec-once = $terminal
exec-once = [workspace name:edit silent] alacritty --class term-tmux -e zsh -c "tmux a || tmux"
windowrule = match:class term-tmux, workspace name:edit silent
exec-once = [workspace name:work silent] google-chrome-stable --class=chrome-work
windowrule = match:class chrome-work, workspace name:work silent
exec-once = [workspace name:read silent] google-chrome-beta --class=chrome-private
windowrule = match:class chrome-private, workspace name:read silent
windowrule = match:workspace name:read, group set always

bind = SUPER, G, togglegroup                    # Create/dissolve a group
bind = SUPER, Tab, changegroupactive, f         # Next window in group
bind = SUPER SHIFT, Tab, changegroupactive, b   # Previous window in group

exec-once = [workspace name:talk silent] xdg-open "slack://open?team=$slack_team"
windowrule = match:class Slack, workspace name:talk silent

exec-once = [workspace name:youtube silent] brave --class=brave-youtube
windowrule = match:class brave-youtube, workspace name:youtube silent
# Brave fullscreen stays within window (fake fullscreen)
windowrule = fullscreen_state 0 2, match:class brave-youtube
exec-once = [workspace name:spotify silent] spotify
windowrule = match:class spotify, workspace name:spotify silent


# exec-once = waybar & hyprpaper & firefox
exec-once = hypridle &
#exec-once = nm-applet & blueman-applet &
layerrule = blur on, match:namespace eww-sidebar
layerrule = ignore_alpha 0.3, match:namespace eww-sidebar
exec-once = hyprpaper


#windowrule = match:class ^(Alacritty)$, workspace 2
exec-once = ~/.config/hypr/monitor-handler.sh

workspace = name:work, monitor:DP-3, monitor:HDMI-A-1, persistent:true
workspace = name:edit, monitor:DP-3, monitor:HDMI-A-1, persistent:true
workspace = name:read, monitor:DP-3, monitor:HDMI-A-1, persistent:true
workspace = name:talk, monitor:DP-3, monitor:HDMI-A-1, persistent:true
workspace = name:youtube, monitor:DP-3, monitor:HDMI-A-1, persistent:true
workspace = name:spotify, monitor:eDP-1, persistent:true
workspace = name:meet, monitor:eDP-1, persistent:true
workspace = name:presentation, monitor:DP-3, monitor:HDMI-A-1

# pavucontrol floating
windowrule = match:class ^.*vucontrol.*$, float on

# No borders on workspaces with only 1 visible tiled window
windowrule = match:workspace w[vt1], border_size 0
# windowrule = match:class term-tmux, border_size 1, rounding 10, border_color 0x1E1E1E
# workspace = 2, gapsout:10

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 0

    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 3
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.98

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 3

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 0, 4.79, easeOutQuint
    # animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    # animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    # animation = workspacesIn, 1, 1.21, almostLinear, fade
    # animation = workspacesOut, 1, 1.94, almostLinear, fade
   animation = workspacesIn, 0, 1.01, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

group {
  groupbar {
    enabled = true
    font_size = 17
    height = 1
    text_offset = -10
    # indicator_gap = 1
    indicator_height = 20
    # render_titles = false
    # text_color = rgba(000000ff)
    text_color_inactive = rgba(ffffff44)
    col.active = rgba(0E161955)
    col.inactive = rgba(00ff9911)
    # gaps_in = 0
    blur = true
  }
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
bindd = $mainMod SHIFT, A, ClaudeAI, exec, launch-webapp "https://claude.ai/"
bindd = $mainMod SHIFT, V, ClaudeAI, exec, [workspace name:meet] launch-webapp "https://meet.google.com/"
# bindd = $mainMod SHIFT, A, ClaudeAI, exec, ~/.local/bin/launch-webapp "https://claude.ai/"

#bindd = $mainMod, 1, tmux, exec, launch-or-focus alacritty alacritty -e zsh -c "tmux a || tmux"
bindd = $mainMod, 1, tmux, workspace, name:edit
bindd = $mainMod, 2, slack, exec, launch-or-focus slack slack
bindd = $mainMod, 3, meet, exec, launch-or-focus-webapp --workspace meet "Google Meet" "https://meet.google.com/"
bindd = $mainMod, 4, music, exec, launch-or-focus spotify spotify

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = alt, F4, killactive,
#bind = $mainMod SHIFT, C, killactive,
#bind = $mainMod CTRL SHIFT, C, exec, hyprctl kill
bind = $mainMod CTRL SHIFT, C, exec, kill -9 $(hyprctl activewindow -j | jq '.pid')

bind = $mainMod, M, exit,
bind = $mainMod, F, exec, $fileManager
#bind = $mainMod CTRL, P, exec, hyprpicker
bind = $mainMod, V, togglefloating,
#bind = $mainMod, R, exec, $menu
#bindr = $mainMod, SUPER_L , exec, $menu

# Fuzzy launcher
bindd = $mainMod, D, Fuzzy Launcher, exec, fzl --launch
windowrule {
  name = fzl-launcher
  match:class = fzl-launcher
  float = on
  size = 800 500
  center = on
  pin = on
  dim_around = on
}
bindd = $mainMod, P, Presentation mode, exec, ~/.config/hypr/presentation-mode.sh
# bind = $mainMod Shift, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod shift, h, movefocus, l
bind = $mainMod shift, l, movefocus, r
bind = $mainMod shift, k, movefocus, u
bind = $mainMod shift, j, movefocus, d


# Switch workspaces with mainMod + [0-9]
# bind = $mainMod, 1, workspace, 1
# bind = $mainMod, 2, workspace, 2
# bind = $mainMod, 3, workspace, 3
# bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, name:youtube
bind = $mainMod, 6, workspace, name:spotify
bind = $mainMod, 7, workspace, name:meet

bind = $mainMod, W, workspace, name:work
bind = $mainMod, E, workspace, name:edit
bind = $mainMod, R, workspace, name:read
bind = $mainMod, T, workspace, name:talk
bind = $mainMod, Y, workspace, name:youtube


# Move active window to a workspace with mainMod + SHIFT + [0-9]
# bind = $mainMod SHIFT, 1, movetoworkspace, 1
# bind = $mainMod SHIFT, 2, movetoworkspace, 2
# bind = $mainMod SHIFT, 3, movetoworkspace, 3
# bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, name:youtube
bind = $mainMod SHIFT, 6, movetoworkspace, name:spotify
bind = $mainMod SHIFT, 7, movetoworkspace, name:meet

bind = $mainMod SHIFT, W, movetoworkspace, name:work
bind = $mainMod SHIFT, E, movetoworkspace, name:edit
bind = $mainMod SHIFT, R, movetoworkspace, name:read
bind = $mainMod SHIFT, T, movetoworkspace, name:talk
bind = $mainMod SHIFT, Y, movetoworkspace, name:youtube

bind = $mainMod CTRL, R, exec, eww reload && ~/.config/waybar/reload.sh

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, space, fullscreen, 1
bind = $mainMod, L, exec, hyprlock

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# bind = $mainMod, n, workspace, e+1
# bind = $mainMod, p, workspace, e-1
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# bind = , PRINT, exec, grim -g "$(slurp)" - | satty -f - --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png --copy-command wl-copy --save-after-copy --early-exit --initial-tool brush
# bind = SHIFT , PRINT, exec, grim - | satty -f - --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png --copy-command wl-copy --save-after-copy --early-exit --initial-tool brush
bind = , PRINT, exec, hyprshot -m region -z -r - | satty -f - --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png --copy-command wl-copy --save-after-copy --early-exit --initial-tool brush
bind = SHIFT , PRINT, exec, hyprshot -m active -m output -z -r - | satty -f - --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png --copy-command wl-copy --save-after-copy --early-exit --initial-tool brush
windowrule = match:class com.gabm.satty, float on, group deny

##############################
### WINDOWS AND WORKSPACES ###
##############################

